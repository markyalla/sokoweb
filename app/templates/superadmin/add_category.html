{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Add New Category</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Category Name</label>
                            <input type="text" name="name" class="form-control" placeholder="e.g. Restaurants, Fashion" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Icon / Image URL</label>
                            <input type="text" name="image_url" class="form-control" placeholder="URL to icon">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Display Order</label>
                            <input type="number" name="sort_order" class="form-control" value="0">
                            <small class="text-muted">Lower numbers appear first.</small>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Create Category</button>
                            <a href="{{ url_for('shopper.index') }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
