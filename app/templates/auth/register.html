{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center py-4">
    <div class="col-12 col-md-10 col-lg-7 col-xl-6">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-lg-5">
                <div class="text-center mb-5">
                    <h3 class="fw-bold">Create Admin Profile</h3>
                    <p class="text-muted">Set up your credentials for the Super Admin panel</p>
                </div>

                <form method="POST">
                    <div class="row g-3 mb-3">
                        <div class="col-12 col-sm-6">
                            <label class="form-label fw-semibold text-secondary small">FULL NAME</label>
                            <input type="text" name="full_name" class="form-control bg-light py-2" placeholder="John Doe" required>
                        </div>
                        <div class="col-12 col-sm-6">
                            <label class="form-label fw-semibold text-secondary small">EMAIL ADDRESS</label>
                            <input type="email" name="email" class="form-control bg-light py-2" placeholder="john@soko.com" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">PHONE NUMBER</label>
                        <input type="tel" name="phone_number" class="form-control bg-light py-2" placeholder="+233..." required>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-12 col-sm-6">
                            <label class="form-label fw-semibold text-secondary small">PASSWORD</label>
                            <input type="password" name="password" class="form-control bg-light py-2" required>
                        </div>
                        <div class="col-12 col-sm-6">
                            <label class="form-label fw-semibold text-secondary small">CONFIRM PASSWORD</label>
                            <input type="password" name="confirm_password" class="form-control bg-light py-2" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-3 fw-bold rounded-3 mb-4">
                        Initialize Super Admin Profile
                    </button>

                    <div class="text-center">
                        <a href="{{ url_for('auth.login') }}" class="text-decoration-none text-muted small">
                            Already have an account? <span class="text-primary fw-bold">Login here</span>
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
