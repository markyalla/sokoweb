{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card border-0 shadow-lg" style="width: 100%; max-width: 400px; border-radius: 1rem;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                    <i class="bi bi-shield-lock" style="font-size: 1.5rem;"></i>
                </div>
                <h3 class="fw-bold text-dark">Super Admin</h3>
                <p class="text-muted">Enter your credentials to access the panel</p>
            </div>
            <form method="POST">
                <div class="form-floating mb-3">
                    <input type="text" name="identifier" class="form-control" id="idInput" placeholder="Email or Phone" required>
                    <label for="idInput">Email or Phone</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" name="password" class="form-control" id="pwInput" placeholder="Password" required>
                    <label for="pwInput">Password</label>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" style="border-radius: 0.5rem;">Login</button>
                <div class="text-center">
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none text-muted small">Need an account? Register here</a>
                </div>
            </form>
        </div>
    </div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
{% endblock %}
